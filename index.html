<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(45deg, #ff758c, #ff7eb3, #f6a8ff);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            font-family: "Microsoft YaHei", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #fff;
            text-align: center;
            position: relative;
            padding: 20px;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .title {
            font-size: 36px;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #fff;
            animation: beat 1.4s infinite alternate;
        }
        @keyframes beat {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }
        .tip-text {
            font-size: 18px;
            margin-bottom: 40px;
            text-shadow: 0 0 8px #fff;
        }
        .btn-box {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 14px 30px;
            font-size: 16px;
            border: none;
            border-radius: 50px;
            background: #ff4a70;
            color: white;
            cursor: pointer;
        }
        .no-btn {
            background: #ccc;
            color: #333;
        }
        .heart {
            position: absolute;
            width: 25px;
            height: 25px;
            background: #ff4757;
            transform: rotate(-45deg);
            animation: floatHearts 5s linear forwards;
            z-index: -1;
        }
        .heart::before,
        .heart::after {
            content: '';
            width: 25px;
            height: 25px;
            background: inherit;
            border-radius: 50%;
            position: absolute;
        }
        .heart::before { top: -12px; left: 0; }
        .heart::after { top: 0; left: 12px; }
        @keyframes floatHearts {
            0% { opacity: 1; transform: translateY(0) rotate(-45deg); }
            100% { opacity: 0; transform: translateY(-800px) rotate(-45deg); }
        }
        .success-hint {
            margin-top: 30px;
            font-size: 22px;
            display: none;
        }
    </style>
</head>
<body>

<!-- 背景音乐（已正确闭合，不影响按钮） -->
<audio autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<h1 class="title">你巧克力，你素质低！</h1>
<p class="tip-text">你是个笨蛋吗？</p>

<div class="btn-box">
    <button class="yes-btn">对啊！！！</button>
    <button class="no-btn">才不是！！！</button>
</div>

<div class="success-hint">❤️❤️❤️❤️❤️❤️</div>

<script>
// 爱心特效
function createHeart() {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    const size = Math.random() * 20 + 10;
    const x = Math.random() * window.innerWidth;
    const color = `hsl(${Math.random()*360},95%,60%)`;
    heart.style.width = size + 'px';
    heart.style.height = size + 'px';
    heart.style.left = x + 'px';
    heart.style.background = color;
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
}
setInterval(createHeart, 300);
document.addEventListener('click', createHeart);

// 按钮功能
const yesBtn = document.querySelector('.yes-btn');
const noBtn = document.querySelector('.no-btn');
const hint = document.querySelector('.success-hint');

yesBtn.addEventListener('click', () => {
    hint.style.display = 'block';
    alert('超开心！🥰');
});

let moveTimes = 0;
noBtn.addEventListener('mouseover', () => {
    if (moveTimes > 5) return;
    moveTimes++;
    const ranX = (Math.random() - 0.5) * 100;
    const ranY = (Math.random() - 0.5) * 60;
    noBtn.style.transform = `translate(${ranX}px, ${ranY}px)`;
});

noBtn.addEventListener('click', () => {
    alert('不许逃跑，你就是！😜');
});
</script>

</body>
</html>
