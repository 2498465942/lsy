<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超大居中跳动爱心</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            width: 100vh;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffffff;
        }
        #clickBtn{
            padding: 16px 40px;
            font-size: 22px;
            background: red;
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            z-index: 10;
        }
        .heart{
            position: fixed;
            left: 50%;
            top: 50%;
            font-size: 300px;
            color: red;
            transform: translate(-50%,-50%);
            animation: beat 0.4s infinite alternate;
        }
        @keyframes beat{
            0%{transform: translate(-50%,-50%) scale(1);}
            100%{transform: translate(-50%,-50%) scale(1.2);}
        }
    </style>
</head>
<body>
    <div>
        <h1>你是个笨蛋嘛！！！</h1>
        <h1>你是个笨蛋嘛！！！</h1>
        <h1>你是个笨蛋嘛！！！</h1>
        <button id="clickBtn">点击</button>
    </div>

    <script>
        const btn = document.getElementById('clickBtn');
        btn.addEventListener('click',()=>{
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.textContent = '❤️';
            document.body.appendChild(heart);
        })
    </script>
</body>
</html>
