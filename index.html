<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 优化手机视口设置，添加缩放控制 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>超大居中跳动爱心</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            /* 改为100vw宽度，100vh高度，适配手机全屏 */
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column; /* 垂直排列内容，适配手机竖屏 */
            justify-content: center;
            align-items: center;
            background: #ffffff;
            padding: 0 20px; /* 左右内边距，防止内容贴边 */
            overflow: hidden; /* 隐藏溢出内容 */
        }
        /* 标题样式适配手机 */
        h1{
            font-size: clamp(18px, 5vw, 28px); /* 响应式字体大小 */
            text-align: center;
            margin-bottom: 10px;
        }
        #clickBtn{
            padding: 14px 36px; /* 适度缩小按钮内边距 */
            font-size: clamp(16px, 4vw, 20px); /* 响应式字体 */
            background: red;
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            z-index: 10;
            margin-top: 20px;
            touch-action: manipulation; /* 优化手机点击体验 */
        }
        /* 爱心样式适配手机屏幕 */
        .heart{
            position: fixed;
            left: 50%;
            top: 50%;
            /* 使用vw单位，适配不同宽度手机 */
            font-size: clamp(150px, 50vw, 300px);
            color: red;
            transform: translate(-50%,-50%);
            animation: beat 0.4s infinite alternate;
            z-index: 5;
        }
        @keyframes beat{
            0%{transform: translate(-50%,-50%) scale(1);}
            100%{transform: translate(-50%,-50%) scale(1.2);}
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>你是个笨蛋嘛！！！</h1>
        <h1>你是个笨蛋嘛！！！</h1>
        <h1>你是个笨蛋嘛！！！</h1>
        <button id="clickBtn">点击</button>
    </div>

    <script>
        const btn = document.getElementById('clickBtn');
        btn.addEventListener('click',()=>{
            // 先移除已存在的爱心，避免重复创建
            const oldHeart = document.querySelector('.heart');
            if(oldHeart) oldHeart.remove();
            
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.textContent = '❤️';
            document.body.appendChild(heart);
        })
    </script>
</body>
</html>
