<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跳动红心</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
        }
        .wrap{
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        button{
            padding: 15px 35px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            background: #e62424;
            color: #fff;
            cursor: pointer;
        }
        .heart{
            position: absolute;
            font-size: 60px;
            color: red;
            animation: beat 0.5s infinite alternate;
        }
        @keyframes beat{
            from{transform: scale(1);}
            to{transform: scale(1.4);}
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>你是个笨蛋嘛！！！</h1>
        <h1>你是个笨蛋嘛！！！</h1>
        <h1>你是个笨蛋嘛！！！</h1>
        <button id="btn">点击</button>
    </div>

    <script>
        const btn = document.getElementById('btn');
        btn.onclick = function(){
            let heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤️';
            heart.style.left = '50%';
            heart.style.top = '50%';
            heart.style.transform = 'translate(-50%,-50%)';
            document.body.appendChild(heart);
        }
    </script>
</body>
</html>
